version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: sentinel_db
    environment:
      POSTGRES_DB: sentinel_db
      POSTGRES_USER: sentinel_user
      POSTGRES_PASSWORD: sentinel_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sentinel_user -d sentinel_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: sentinel_app
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql+asyncpg://sentinel_user:sentinel_password@db:5432/sentinel_db
      - DATABASE_SYNC_URL=postgresql://sentinel_user:sentinel_password@db:5432/sentinel_db
    volumes:
      - ./app:/app/app
      - ./alembic:/app/alembic
      - ./alembic.ini:/app/alembic.ini
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_data: